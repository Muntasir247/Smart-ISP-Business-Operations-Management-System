<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promee Internet - Ticket Reports</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260326f" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .report-card {
        height: 100%;
      }
      .chart-placeholder {
        height: 200px;
        background: #f8f9fa;
        border: 2px dashed #ddd;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div id="app-header"></div>
<div class="main-content">
<div class="page-content">
        <div class="content-header">
          <h1>Ticket Reports</h1>
          <p>Performance analytics and resolution trends</p>
        </div>

        <div class="grid-3">
          <div class="card report-card">
            <h4>Tickets by Priority</h4>
            <div class="chart-placeholder">Pie Chart Placeholder</div>
          </div>
          <div class="card report-card">
            <h4>Resolution Rate</h4>
            <div class="chart-placeholder">Line Chart Placeholder</div>
          </div>
          <div class="card report-card">
            <h4>Average Response Time</h4>
            <div class="chart-placeholder">Bar Chart Placeholder</div>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/header-loader.js?v=20260327c"></script>
  </body>
</html>
